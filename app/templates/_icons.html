{% macro icon(name, classes="w-5 h-5") %}
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
     stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" class="{{ classes }} shrink-0">
  {%- if name == "dashboard" -%}
    <rect x="3" y="3" width="7" height="9" rx="1.5"></rect>
    <rect x="14" y="3" width="7" height="5" rx="1.5"></rect>
    <rect x="14" y="12" width="7" height="9" rx="1.5"></rect>
    <rect x="3" y="16" width="7" height="5" rx="1.5"></rect>
  {%- elif name == "expenses" -%}
    <path d="M6 3h9l3 3v15H6z"></path>
    <path d="M15 3v3h3"></path>
    <path d="M9 11h6M9 15h6M9 19h3"></path>
  {%- elif name == "categories" -%}
    <path d="M4 4h7l9 9-7 7-9-9V4z"></path>
    <circle cx="8.5" cy="8.5" r="1.25" fill="currentColor" stroke="none"></circle>
  {%- elif name == "account" -%}
    <circle cx="12" cy="8" r="3.5"></circle>
    <path d="M4.5 20c1.4-4 4-6 7.5-6s6.1 2 7.5 6"></path>
  {%- elif name == "logout" -%}
    <path d="M15 4h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-3"></path>
    <path d="M10 8l-4 4 4 4"></path>
    <path d="M6 12h12"></path>
  {%- elif name == "menu" -%}
    <path d="M4 6h16M4 12h16M4 18h16"></path>
  {%- elif name == "close" -%}
    <path d="M6 6l12 12M18 6L6 18"></path>
  {%- elif name == "sun" -%}
    <circle cx="12" cy="12" r="4"></circle>
    <path d="M12 2v2.5M12 19.5V22M4.2 4.2l1.8 1.8M18 18l1.8 1.8M2 12h2.5M19.5 12H22M4.2 19.8l1.8-1.8M18 6l1.8-1.8"></path>
  {%- elif name == "moon" -%}
    <path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5z"></path>
  {%- elif name == "plus" -%}
    <path d="M12 5v14M5 12h14"></path>
  {%- elif name == "edit" -%}
    <path d="M4 20h4L18.5 9.5a2.1 2.1 0 0 0-3-3L5 17v3z"></path>
    <path d="M13.5 6.5l4 4"></path>
  {%- elif name == "trash" -%}
    <path d="M5 7h14"></path>
    <path d="M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>
    <path d="M7 7l1 13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1l1-13"></path>
    <path d="M10 11v6M14 11v6"></path>
  {%- elif name == "arrow-up" -%}
    <path d="M12 19V5M6 11l6-6 6 6"></path>
  {%- elif name == "arrow-down" -%}
    <path d="M12 5v14M6 13l6 6 6-6"></path>
  {%- elif name == "chevron-left" -%}
    <path d="M15 6l-6 6 6 6"></path>
  {%- elif name == "chevron-right" -%}
    <path d="M9 6l6 6-6 6"></path>
  {%- elif name == "search" -%}
    <circle cx="11" cy="11" r="6.5"></circle>
    <path d="M20 20l-4.5-4.5"></path>
  {%- elif name == "download" -%}
    <path d="M12 4v11M7.5 11l4.5 4.5L16.5 11"></path>
    <path d="M5 19h14"></path>
  {%- elif name == "wallet" -%}
    <path d="M4 7a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7z"></path>
    <path d="M16 12h3v3h-3a1.5 1.5 0 0 1 0-3z"></path>
  {%- elif name == "grid" -%}
    <rect x="4" y="4" width="7" height="7" rx="1.2"></rect>
    <rect x="13" y="4" width="7" height="7" rx="1.2"></rect>
    <rect x="4" y="13" width="7" height="7" rx="1.2"></rect>
    <rect x="13" y="13" width="7" height="7" rx="1.2"></rect>
  {%- elif name == "clock" -%}
    <circle cx="12" cy="12" r="8.5"></circle>
    <path d="M12 7.5V12l3 2"></path>
  {%- elif name == "empty" -%}
    <path d="M4 8h16l-1.5 11a2 2 0 0 1-2 1.8H7.5a2 2 0 0 1-2-1.8L4 8z"></path>
    <path d="M8 8V6a4 4 0 0 1 8 0v2"></path>
  {%- elif name == "check" -%}
    <circle cx="12" cy="12" r="8.5"></circle>
    <path d="M8.5 12.5l2.5 2.5 4.5-5.5"></path>
  {%- elif name == "alert" -%}
    <circle cx="12" cy="12" r="8.5"></circle>
    <path d="M12 8v5"></path>
    <circle cx="12" cy="16" r="0.6" fill="currentColor" stroke="none"></circle>
  {%- endif -%}
</svg>
{% endmacro %}
