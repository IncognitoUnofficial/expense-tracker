{% macro render_field(field, extra_classes="") %}
  <div class="mb-4">
    <label for="{{ field.id }}" class="label">
      {{ field.label.text }}
    </label>
    {{ field(class_="input " ~ extra_classes) }}
    {% if field.errors %}
      <ul class="mt-1 text-xs text-signal font-mono">
        {% for error in field.errors %}
          <li>{{ error }}</li>
        {% endfor %}
      </ul>
    {% endif %}
  </div>
{% endmacro %}
