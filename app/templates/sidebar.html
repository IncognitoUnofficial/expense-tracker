{% from "_icons.html" import icon %}

<div id="sidebar-backdrop" class="hidden fixed inset-0 bg-ink/50 z-30 lg:hidden"></div>

<aside id="sidebar"
       class="fixed inset-y-0 left-0 z-40 w-64 -translate-x-full lg:translate-x-0 transition-transform duration-200
              bg-ink text-paper flex flex-col">
  <div class="flex items-center justify-between px-5 py-5">
    <a href="{{ url_for('dashboard.index') }}" class="flex items-center gap-2 font-heading text-lg font-semibold tracking-tight">
      {{ icon("wallet", "w-6 h-6 text-signal") }}
      Expense Tracker
    </a>
    <button type="button" id="sidebar-close" class="lg:hidden p-1 text-paper/70 hover:text-paper" aria-label="Close menu">
      {{ icon("close", "w-5 h-5") }}
    </button>
  </div>

  <nav class="flex-1 px-3 space-y-1 mt-2">
    <a href="{{ url_for('dashboard.index') }}"
       class="nav-link {{ 'nav-link-active' if request.endpoint == 'dashboard.index' }}">
      {{ icon("dashboard", "w-5 h-5") }} Dashboard
    </a>
    <a href="{{ url_for('expenses.list_expenses') }}"
       class="nav-link {{ 'nav-link-active' if request.blueprint == 'expenses' }}">
      {{ icon("expenses", "w-5 h-5") }} Expenses
    </a>
    <a href="{{ url_for('categories.list_categories') }}"
       class="nav-link {{ 'nav-link-active' if request.blueprint == 'categories' }}">
      {{ icon("categories", "w-5 h-5") }} Categories
    </a>
    <a href="{{ url_for('account.settings') }}"
       class="nav-link {{ 'nav-link-active' if request.blueprint == 'account' }}">
      {{ icon("account", "w-5 h-5") }} Account
    </a>
  </nav>

  <div class="px-3 pb-5 pt-3 border-t border-paper/10 space-y-1">
    <button type="button" id="theme-toggle" class="nav-link w-full">
      <span id="theme-icon-sun">{{ icon("sun", "w-5 h-5") }}</span>
      <span id="theme-icon-moon" class="hidden">{{ icon("moon", "w-5 h-5") }}</span>
      <span id="theme-toggle-label">Dark mode</span>
    </button>

    <div class="px-3 py-1 text-xs font-mono text-paper/50 truncate">{{ current_user.name }}</div>

    <form method="post" action="{{ url_for('auth.logout') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <button type="submit" class="nav-link w-full">
        {{ icon("logout", "w-5 h-5") }} Log out
      </button>
    </form>
  </div>
</aside>
